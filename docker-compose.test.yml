services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.4
    ports:
      - "18123:8123"
    volumes:
      - ha-config:/config
    environment:
      - TZ=UTC
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8123/api/ || true); [ \"$$code\" = \"200\" ] || [ \"$$code\" = \"401\" ]",
        ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "15000:5000"
    env_file:
      - .env.test
    environment:
      - PORT=5000
      - CRON_JOB=* * * * *
      - RENDERING_TIMEOUT=60000
      - RENDERING_DELAY=2000
      - RENDERING_SCREEN_HEIGHT=800
      - RENDERING_SCREEN_WIDTH=600
      - GRAYSCALE_DEPTH=8
      - OUTPUT_PATH=/output/cover
      - LANGUAGE=en
      - ROTATION=0
      - SCALING=1
      - UNSAFE_IGNORE_CERTIFICATE_ERRORS=true
      - HTTP_AUTH_USER=e2e-user
      - HTTP_AUTH_PASSWORD=e2e-password
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http=require('node:http');const req=http.request({hostname:'127.0.0.1',port:5000,path:'/favicon.ico',method:'GET'},(res)=>process.exit(res.statusCode===204?0:1));req.on('error',()=>process.exit(1));req.end();",
        ]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 5s
    volumes:
      - app-output:/output
    depends_on:
      homeassistant:
        condition: service_healthy

volumes:
  ha-config:
  app-output:
